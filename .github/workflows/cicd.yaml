name: Deploy to AWS with Terraform

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  deploy-iac:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Setup GitHub OIDC
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install --bin-dir /usr/local/bin --install-dir /usr/local/aws-cli --update

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1

      - name: Install tfsec
        run: |
          curl -sLo tfsec https://github.com/aquasecurity/tfsec/releases/download/v1.28.11/tfsec-linux-amd64
          chmod +x tfsec
          ./tfsec --version

      - name: Terraform Init
        run: terraform init -reconfigure
        working-directory: aws-three-tier-terraform-deploy

      - name: Terraform Format
        run: terraform fmt
        working-directory: aws-three-tier-terraform-deploy

      - name: Terraform Validate
        run: terraform validate
        working-directory: aws-three-tier-terraform-deploy

      - name: tfsec Security Scan
        run: ../tfsec . || true
        working-directory: aws-three-tier-terraform-deploy

      - name: Terraform Plan
        run: terraform plan
        working-directory: aws-three-tier-terraform-deploy

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: aws-three-tier-terraform-deploy

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x ./kubectl
          sudo mv ./kubectl /usr/local/bin/kubectl

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name production-bullionguard-cluster \
            --region us-east-1

      - name: Wait for nodes to be ready
        run: |
          kubectl wait --for=condition=ready node \
            --all --timeout=300s

      - name: Install Nginx Ingress
        run: |
          helm repo add ingress-nginx \
            https://kubernetes.github.io/ingress-nginx
          helm repo update
          helm upgrade --install nginx-ingress \
            ingress-nginx/ingress-nginx \
            --namespace ingress-nginx \
            --create-namespace \
            --version 4.12.0 \
            --timeout 10m \
            --wait \
            -f aws-three-tier-terraform-deploy/module-eks/nginx-ingress-values.yaml

      - name: Install Cert-Manager
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          helm upgrade --install cert-manager \
            jetstack/cert-manager \
            --namespace cert-manager \
            --create-namespace \
            --version 1.14.5 \
            --set installCRDs=true \
            --timeout 10m \
            --wait

      - name: Install ArgoCD
        run: |
          helm repo add argo \
            https://argoproj.github.io/argo-helm
          helm repo update
          helm upgrade --install argocd \
            argo/argo-cd \
            --namespace argocd \
            --create-namespace \
            --version 5.51.6 \
            --timeout 10m \
            --wait \
            -f aws-three-tier-terraform-deploy/module-eks/argocd-values.yaml