name: Build and Push Docker Images to ECR

on:
  push:
    branches:
      - main
    paths:
      - 'main_bank_app_backend/**'
      - 'main_bank_app_frontend/**'
  workflow_dispatch:

jobs:
  build-backend:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region us-east-1 | \
          docker login --username AWS \
          --password-stdin 763832339507.dkr.ecr.us-east-1.amazonaws.com

      - name: Build and push backend image
        run: |
          docker build -t bank-backendapi \
            main_bank_app_backend/
          docker tag bank-backendapi:latest \
            763832339507.dkr.ecr.us-east-1.amazonaws.com/bank-backendapi:latest
          docker push \
            763832339507.dkr.ecr.us-east-1.amazonaws.com/bank-backendapi:latest

  build-frontend:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region us-east-1 | \
          docker login --username AWS \
          --password-stdin 763832339507.dkr.ecr.us-east-1.amazonaws.com

      - name: Build and push frontend image
        run: |
          docker build -t bank-frontend \
            main_bank_app_frontend/
          docker tag bank-frontend:latest \
            763832339507.dkr.ecr.us-east-1.amazonaws.com/bank-frontend:latest
          docker push \
            763832339507.dkr.ecr.us-east-1.amazonaws.com/bank-frontend:latest